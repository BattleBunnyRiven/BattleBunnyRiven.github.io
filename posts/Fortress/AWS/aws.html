<!DOCTYPE html>
<html lang="es">
<head>
<link rel="stylesheet" href="../../../assets/css/style.css">
<link rel="stylesheet" href="../../../assets/css/writeup.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Protected Writeup</title>

<style>
  body {
    display: grid;
    place-items: center;
    overflow: hidden;
  }

  .lockbox {
    width: min(92vw, 520px);
    padding: 2.2rem;
    border-radius: 24px;
    background: rgba(9, 4, 18, .58);
    border: 1px solid rgba(142,107,255,.22);
    backdrop-filter: blur(18px);
    box-shadow: 0 20px 70px rgba(0,0,0,.35);
    text-align: center;
  }

  .terminal {
    text-align: left;
    border: 1px solid rgba(142,107,255,.18);
    background: rgba(0,0,0,.28);
    padding: 1rem;
    border-radius: 14px;
    margin-bottom: 1.5rem;
    font-family: var(--mono);
    color: var(--text-soft);
  }

  input {
    width: 100%;
    padding: 1rem;
    border-radius: 12px;
    border: 1px solid rgba(142,107,255,.22);
    background: rgba(255,255,255,.04);
    color: white;
    font-family: var(--mono);
  }

  button {
    width: 100%;
    margin-top: 1rem;
  }
  
password{

    width:100%;
    padding:1rem;

    border-radius:14px;

    background:rgba(255,255,255,.04);

    border:1px solid rgba(142,107,255,.18);

    color:white;

    backdrop-filter:blur(12px);

    transition:.2s;
}

password:focus{

    outline:none;

    border-color:#8E6BFF;

    box-shadow:
        0 0 20px rgba(142,107,255,.25);

}
</style>
</head>

<body>


  <main class="lockbox">
    <div class="bunny">☠︎</div>

    <h1>Protected Writeup</h1>
    <p class="subtitle">Access is a privilege, not a right.</p>

    <div class="terminal">
      <p>root@anonymous:~$ <span>whoami</span></p>
      <p>anonymous</p>
      <p>root@anonymous:~$ <span>decrypt --writeup</span></p>
      <p>[*] waiting for passphrase...</p>
    </div>

    <input id="password" type="password" placeholder="Enter password..." autocomplete="current-password">

    <label>
      <input id="remember" type="checkbox">
      Remember password
    </label>

<button class="unlock-btn" onclick="unlock()">
    🔓 Decrypt & View
</button>

    <p id="error"></p>

    <div class="footer">
      // trust no one · verify everything
    </div>
  </main>

    const savedPassword = localStorage.getItem("protected_writeup_password");
    if (savedPassword) {
      document.getElementById("password").value = savedPassword;
      document.getElementById("remember").checked = true;
    }

    function b64ToBytes(b64) {
      return Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    }

    async function unlock() {
      const password = document.getElementById("password").value;
      const remember = document.getElementById("remember").checked;
      const error = document.getElementById("error");

      try {
        const enc = new TextEncoder();

        const keyMaterial = await crypto.subtle.importKey(
          "raw",
          enc.encode(password),
          "PBKDF2",
          false,
          ["deriveKey"]
        );

        const key = await crypto.subtle.deriveKey(
          {
            name: "PBKDF2",
            salt: b64ToBytes(encryptedData.salt),
            iterations: encryptedData.iterations,
            hash: "SHA-256"
          },
          keyMaterial,
          { name: "AES-GCM", length: 256 },
          false,
          ["decrypt"]
        );

        const decrypted = await crypto.subtle.decrypt(
          {
            name: "AES-GCM",
            iv: b64ToBytes(encryptedData.nonce)
          },
          key,
          b64ToBytes(encryptedData.ciphertext)
        );

        if (remember) {
          localStorage.setItem("protected_writeup_password", password);
        } else {
          localStorage.removeItem("protected_writeup_password");
        }

        const html = new TextDecoder().decode(decrypted);

        document.open();
        document.write(html);
        document.close();

      } catch {
        error.textContent = "Password incorrecta o contenido corrupto.";
      }
    }
